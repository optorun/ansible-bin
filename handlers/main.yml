---

- name: System-reboot
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible on packages update process"
    reboot_timeout: 300
    post_reboot_delay: 30
    test_command: uptime
  when:
    - ansible_bin_autoreboot|d()|bool
    - ansible_connection not in [ "container", "docker", "community.docker.docker" ]
